name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Image
      run: |
        docker build -t demo-app:${{ github.sha }} .

    - name: Tag Image
      run: |
        docker tag demo-app:${{ github.sha }} \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/demo-app:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/demo-app:${{ github.sha }}

    - name: Setup Kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure Kubeconfig
      run: |
        aws eks update-kubeconfig \
        --region ap-south-1 \
        --name demo-cluster

    - name: Update Deployment
      run: |
        kubectl set image deployment/demo-app \
        demo-app=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/demo-app:${{ github.sha }}

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/demo-app